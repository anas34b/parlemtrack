services:
  postgres:
    image: postgres:16
    container_name: parlemtrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: parlemtrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parlemtrack}
      POSTGRES_DB: parlemtrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parlemtrack -d parlemtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: parlemtrack_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
