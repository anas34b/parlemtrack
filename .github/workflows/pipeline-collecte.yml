name: Collecte nocturne

# Le pipeline tourne DANS le conteneur backend du VPS de production, via SSH
# (mêmes secrets que deploy.yml : OVH_HOST, OVH_USER, OVH_SSH_KEY, OVH_PORT) —
# pas de connexion directe à PostgreSQL/Redis depuis le runner GitHub, ces
# services n'étant volontairement pas exposés sur l'hôte (voir
# docker-compose.prod.yml). Le conteneur backend a déjà toutes les variables
# d'environnement nécessaires (DATABASE_URL, MISTRAL_API_KEY, REDIS_URL),
# définies une seule fois dans le `.env` du serveur.

on:
  schedule:
    # 4h00 UTC ≈ 6h00 Paris (heure d'été) / 5h00 Paris (heure d'hiver)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - name: Exécuter le pipeline de collecte sur le VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          port: ${{ secrets.OVH_PORT }}
          script: |
            cd ~/parlemtrack
            docker compose -f docker-compose.prod.yml exec -T backend python -m pipeline.run

      - name: Créer une issue de suivi en cas d'échec
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Échec de la collecte nocturne — run #${context.runNumber}`,
              body: `Le pipeline de collecte a échoué.\n\nDétails : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["pipeline", "échec-collecte"],
            });
