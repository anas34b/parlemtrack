name: Collecte nocturne

on:
  schedule:
    # 4h00 UTC ≈ 6h00 Paris (heure d'été) / 5h00 Paris (heure d'hiver)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  collecte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Exécuter le pipeline de collecte
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: python -m pipeline.run

      - name: Créer une issue de suivi en cas d'échec
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Échec de la collecte nocturne — run #${context.runNumber}`,
              body: `Le pipeline de collecte a échoué.\n\nDétails : ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["pipeline", "échec-collecte"],
            });
