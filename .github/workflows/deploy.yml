name: Déploiement

# Secrets attendus (à configurer dans Settings > Secrets and variables > Actions,
# jamais commités) : OVH_HOST, OVH_USER, OVH_SSH_KEY, OVH_PORT.
# Un seul environnement de déploiement est supposé ici, cloné dans
# ~/parlemtrack sur le VPS — voir docs/manuels/deploiement.md.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déployer sur le VPS OVHcloud
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.OVH_SSH_KEY }}
          port: ${{ secrets.OVH_PORT }}
          script: |
            cd ~/parlemtrack
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build
